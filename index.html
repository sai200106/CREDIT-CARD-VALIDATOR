<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CardScan — Luhn Validator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0A0E1A;
    --card-bg: #0F1628;
    --panel: #111827;
    --cyan: #00F5FF;
    --cyan-dim: rgba(0,245,255,0.15);
    --cyan-glow: rgba(0,245,255,0.4);
    --amber: #FF6B35;
    --amber-dim: rgba(255,107,53,0.15);
    --green: #00FF88;
    --green-dim: rgba(0,255,136,0.15);
    --text: #E8F4F8;
    --muted: #4A6278;
    --metal: #1E2D4A;
  }

  body {
    background: var(--navy);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    padding: 20px;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Corner decorations */
  .corner {
    position: fixed;
    width: 80px;
    height: 80px;
    opacity: 0.3;
  }
  .corner.tl { top: 20px; left: 20px; border-top: 1px solid var(--cyan); border-left: 1px solid var(--cyan); }
  .corner.tr { top: 20px; right: 20px; border-top: 1px solid var(--cyan); border-right: 1px solid var(--cyan); }
  .corner.bl { bottom: 20px; left: 20px; border-bottom: 1px solid var(--cyan); border-left: 1px solid var(--cyan); }
  .corner.br { bottom: 20px; right: 20px; border-bottom: 1px solid var(--cyan); border-right: 1px solid var(--cyan); }

  .wrapper {
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    gap: 28px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
  }
  .header .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--cyan);
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: 0.8;
  }
  .header h1 {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--text) 40%, var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p {
    color: var(--muted);
    font-size: 14px;
    margin-top: 6px;
    font-weight: 300;
  }

  /* === CREDIT CARD === */
  .card-scene {
    perspective: 1000px;
    height: 200px;
    position: relative;
  }
  .credit-card {
    width: 100%;
    height: 200px;
    border-radius: 16px;
    background: linear-gradient(135deg, #1a2744 0%, #0d1a35 40%, #1a2a50 100%);
    border: 1px solid rgba(0,245,255,0.2);
    padding: 24px 28px;
    position: relative;
    overflow: hidden;
    transition: transform 0.4s ease, box-shadow 0.4s ease;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,245,255,0.1);
  }
  .credit-card:hover {
    transform: rotateY(-3deg) rotateX(2deg);
    box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 30px rgba(0,245,255,0.1);
  }

  /* Card shimmer lines */
  .credit-card::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(
      105deg,
      transparent 40%,
      rgba(0,245,255,0.04) 50%,
      transparent 60%
    );
    animation: shimmer 4s infinite;
  }
  @keyframes shimmer {
    0% { transform: translateX(-100%) rotate(0deg); }
    100% { transform: translateX(100%) rotate(0deg); }
  }

  /* Scan beam */
  .scan-beam {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    box-shadow: 0 0 15px var(--cyan), 0 0 30px var(--cyan-glow);
    opacity: 0;
    transform: translateY(-10px);
    transition: none;
  }
  .scan-beam.scanning {
    animation: scan 1.2s ease-in-out;
  }
  @keyframes scan {
    0%   { opacity: 0; transform: translateY(-10px); }
    10%  { opacity: 1; transform: translateY(0px); }
    90%  { opacity: 1; transform: translateY(196px); }
    100% { opacity: 0; transform: translateY(196px); }
  }

  /* Card chip */
  .card-chip {
    width: 44px;
    height: 34px;
    background: linear-gradient(135deg, #c8a84b, #f0d060, #c8a84b, #a07830);
    border-radius: 6px;
    position: relative;
    overflow: hidden;
    margin-bottom: 20px;
    flex-shrink: 0;
  }
  .card-chip::before {
    content: '';
    position: absolute;
    top: 50%; left: 0; right: 0;
    height: 1px;
    background: rgba(0,0,0,0.3);
    transform: translateY(-50%);
  }
  .card-chip::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0; left: 50%;
    width: 1px;
    background: rgba(0,0,0,0.3);
    transform: translateX(-50%);
  }

  .card-top-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .card-brand {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
  }

  /* Card number display */
  .card-number-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 6px;
    color: rgba(255,255,255,0.9);
    margin-bottom: 16px;
    min-height: 32px;
    display: flex;
    gap: 18px;
    align-items: center;
  }
  .card-group {
    display: inline-block;
    min-width: 4ch;
    transition: color 0.3s ease;
  }
  .card-group.filled { color: #ffffff; }
  .card-group.placeholder { color: rgba(255,255,255,0.2); }

  .card-bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .card-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .card-holder-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    letter-spacing: 2px;
  }

  /* Valid/invalid card glow */
  .credit-card.valid {
    border-color: rgba(0,255,136,0.5);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(0,255,136,0.2);
  }
  .credit-card.invalid {
    border-color: rgba(255,107,53,0.5);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(255,107,53,0.2);
  }

  /* === INPUT PANEL === */
  .input-panel {
    background: var(--panel);
    border: 1px solid rgba(0,245,255,0.1);
    border-radius: 16px;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .input-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }
  .card-input {
    width: 100%;
    background: var(--metal);
    border: 1px solid rgba(0,245,255,0.15);
    border-radius: 10px;
    padding: 16px 52px 16px 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    letter-spacing: 4px;
    color: var(--text);
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
    caret-color: var(--cyan);
  }
  .card-input::placeholder {
    color: var(--muted);
    letter-spacing: 2px;
    font-size: 16px;
  }
  .card-input:focus {
    border-color: rgba(0,245,255,0.5);
    box-shadow: 0 0 0 3px rgba(0,245,255,0.08), inset 0 0 20px rgba(0,245,255,0.02);
  }

  .input-icon {
    position: absolute;
    right: 16px;
    font-size: 20px;
    opacity: 0.4;
    pointer-events: none;
  }

  /* Digit counter */
  .digit-track {
    display: flex;
    gap: 4px;
    margin-top: 2px;
  }
  .digit-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.2s ease, transform 0.2s ease;
    flex-shrink: 0;
  }
  .digit-dot.active {
    background: var(--cyan);
    transform: scale(1.3);
  }

  /* Validate button */
  .validate-btn {
    background: transparent;
    border: 1px solid var(--cyan);
    color: var(--cyan);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 16px;
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
  }
  .validate-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--cyan);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
  }
  .validate-btn:hover::before { transform: scaleX(1); }
  .validate-btn:hover { color: var(--navy); }
  .validate-btn:active { transform: scale(0.98); }
  .validate-btn span { position: relative; z-index: 1; }
  .validate-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }
  .validate-btn:disabled::before { display: none; }

  /* === RESULT === */
  .result-panel {
    border-radius: 14px;
    padding: 24px 28px;
    display: none;
    flex-direction: column;
    gap: 16px;
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
  }
  .result-panel.show { display: flex; }
  .result-panel.valid-result {
    background: var(--green-dim);
    border: 1px solid rgba(0,255,136,0.3);
  }
  .result-panel.invalid-result {
    background: var(--amber-dim);
    border: 1px solid rgba(255,107,53,0.3);
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.9) translateY(10px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .result-header {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .result-icon {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .valid-result .result-icon {
    background: rgba(0,255,136,0.2);
    box-shadow: 0 0 20px rgba(0,255,136,0.3);
  }
  .invalid-result .result-icon {
    background: rgba(255,107,53,0.2);
    box-shadow: 0 0 20px rgba(255,107,53,0.3);
  }
  .result-text h3 {
    font-size: 18px;
    font-weight: 700;
  }
  .valid-result .result-text h3 { color: var(--green); }
  .invalid-result .result-text h3 { color: var(--amber); }
  .result-text p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* Luhn breakdown */
  .breakdown {
    background: rgba(0,0,0,0.25);
    border-radius: 10px;
    padding: 16px;
  }
  .breakdown-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .breakdown-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .bd-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    min-width: 30px;
  }
  .bd-orig {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
  }
  .bd-proc {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--cyan);
  }
  .bd-cell.doubled .bd-orig { color: var(--cyan); }

  .sum-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .sum-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
  }
  .sum-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 700;
  }
  .valid-result .sum-value { color: var(--green); }
  .invalid-result .sum-value { color: var(--amber); }

  /* Footer */
  .footer {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1px;
    opacity: 0.5;
  }

  /* Particles */
  .particle {
    position: fixed;
    pointer-events: none;
    border-radius: 50%;
    animation: burst 0.8s ease-out forwards;
    z-index: 999;
  }
  @keyframes burst {
    0%   { opacity: 1; transform: scale(1) translate(0, 0); }
    100% { opacity: 0; transform: scale(0) translate(var(--tx), var(--ty)); }
  }

  /* Responsive */
  @media (max-width: 480px) {
    .card-number-display { font-size: 16px; letter-spacing: 3px; gap: 10px; }
    .card-input { font-size: 16px; letter-spacing: 3px; }
    .credit-card { padding: 18px 20px; }
  }
</style>
</head>
<body>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="wrapper">

  <!-- Header -->
  <div class="header">
    <div class="eyebrow">// Luhn Protocol v2.0</div>
    <h1>CardScan</h1>
    <p>Enter any card number. We'll run the Luhn algorithm in real-time.</p>
  </div>

  <!-- Credit Card Visual -->
  <div class="card-scene">
    <div class="credit-card" id="creditCard">
      <div class="scan-beam" id="scanBeam"></div>

      <div class="card-top-row">
        <div class="card-chip"></div>
        <div class="card-brand" id="cardBrand">•••</div>
      </div>

      <div class="card-number-display" id="cardDisplay">
        <span class="card-group placeholder" id="g1">••••</span>
        <span class="card-group placeholder" id="g2">••••</span>
        <span class="card-group placeholder" id="g3">••••</span>
        <span class="card-group placeholder" id="g4">••••</span>
      </div>

      <div class="card-bottom">
        <div>
          <div class="card-label">Card Holder</div>
          <div class="card-holder-name">CARD SCAN USER</div>
        </div>
        <div style="text-align:right;">
          <div class="card-label">Exp</div>
          <div class="card-holder-name" style="font-size:12px;">••/••</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Input Panel -->
  <div class="input-panel">
    <div class="input-group">
      <div class="input-label">Card Number</div>
      <div class="input-wrapper">
        <input
          type="text"
          class="card-input"
          id="cardInput"
          placeholder="0000 0000 0000 0000"
          maxlength="19"
          autocomplete="off"
          inputmode="numeric"
        >
        <span class="input-icon">💳</span>
      </div>
      <div class="digit-track" id="digitTrack"></div>
    </div>

    <button class="validate-btn" id="validateBtn" disabled>
      <span id="btnText">⬡ &nbsp;Run Luhn Scan</span>
    </button>
  </div>

  <!-- Result Panel -->
  <div class="result-panel" id="resultPanel">
    <div class="result-header">
      <div class="result-icon" id="resultIcon"></div>
      <div class="result-text">
        <h3 id="resultTitle"></h3>
        <p id="resultSubtitle"></p>
      </div>
    </div>
    <div class="breakdown" id="breakdown">
      <div class="breakdown-title">// Luhn Computation</div>
      <div class="breakdown-grid" id="breakdownGrid"></div>
      <div class="sum-row">
        <span class="sum-label">Total Sum</span>
        <span class="sum-value" id="sumValue"></span>
      </div>
    </div>
  </div>

  <div class="footer">// ISO/IEC 7812-1 · Luhn Algorithm · No data is stored or transmitted</div>
</div>

<script>
  const input = document.getElementById('cardInput');
  const btn = document.getElementById('validateBtn');
  const btnText = document.getElementById('btnText');
  const card = document.getElementById('creditCard');
  const scanBeam = document.getElementById('scanBeam');
  const resultPanel = document.getElementById('resultPanel');
  const digitTrack = document.getElementById('digitTrack');

  // Build digit dots (16 dots)
  for (let i = 0; i < 16; i++) {
    const dot = document.createElement('div');
    dot.className = 'digit-dot';
    dot.id = `dot-${i}`;
    digitTrack.appendChild(dot);
  }

  // Card brand detection
  function detectBrand(num) {
    if (/^4/.test(num)) return 'VISA';
    if (/^5[1-5]/.test(num)) return 'MASTERCARD';
    if (/^3[47]/.test(num)) return 'AMEX';
    if (/^6(?:011|5)/.test(num)) return 'DISCOVER';
    if (num.length > 0) return 'CARD';
    return '•••';
  }

  // Format input with spaces
  input.addEventListener('input', (e) => {
    let val = e.target.value.replace(/\D/g, '').slice(0, 16);
    let formatted = val.match(/.{1,4}/g)?.join(' ') || '';
    e.target.value = formatted;

    updateCard(val);
    updateDots(val.length);

    // Enable button only at 13–19 digits
    btn.disabled = val.length < 13;

    // Reset card glow
    card.classList.remove('valid', 'invalid');
    resultPanel.classList.remove('show', 'valid-result', 'invalid-result');
    btnText.innerHTML = '⬡ &nbsp;Run Luhn Scan';
  });

  function updateCard(digits) {
    const groups = ['g1','g2','g3','g4'];
    const brand = document.getElementById('cardBrand');
    brand.textContent = detectBrand(digits);

    groups.forEach((id, i) => {
      const el = document.getElementById(id);
      const chunk = digits.slice(i*4, (i+1)*4);
      if (chunk.length > 0) {
        el.textContent = chunk.padEnd(4, '·');
        el.classList.remove('placeholder');
        el.classList.add('filled');
      } else {
        el.textContent = '••••';
        el.classList.remove('filled');
        el.classList.add('placeholder');
      }
    });
  }

  function updateDots(count) {
    for (let i = 0; i < 16; i++) {
      const dot = document.getElementById(`dot-${i}`);
      dot.classList.toggle('active', i < count);
    }
  }

  // Luhn algorithm
  function luhnCheck(num) {
    const digits = num.split('').map(Number).reverse();
    let sum = 0;
    const steps = [];

    digits.forEach((d, i) => {
      let proc = d;
      let doubled = false;
      if (i % 2 === 1) {
        proc = d * 2;
        doubled = true;
        if (proc > 9) proc -= 9;
      }
      sum += proc;
      steps.push({ orig: d, proc, doubled });
    });

    return { valid: sum % 10 === 0, sum, steps: steps.reverse() };
  }

  // Particles
  function spawnParticles(valid) {
    const color = valid ? '#00FF88' : '#FF6B35';
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;

    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 8 + 4;
      const angle = (Math.random() * 360) * (Math.PI / 180);
      const dist = Math.random() * 200 + 80;
      const tx = Math.cos(angle) * dist + 'px';
      const ty = Math.sin(angle) * dist + 'px';
      p.style.cssText = `
        width:${size}px; height:${size}px;
        background:${color};
        left:${cx}px; top:${cy}px;
        --tx:${tx}; --ty:${ty};
        box-shadow: 0 0 6px ${color};
        animation-delay: ${Math.random()*0.2}s;
        animation-duration: ${0.6 + Math.random()*0.4}s;
      `;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 1200);
    }
  }

  // Validate
  btn.addEventListener('click', () => {
    const raw = input.value.replace(/\D/g, '');
    if (raw.length < 13) return;

    // Disable during scan
    btn.disabled = true;
    btnText.innerHTML = '◌ &nbsp;Scanning...';

    // Trigger scan beam
    scanBeam.classList.remove('scanning');
    void scanBeam.offsetWidth; // reflow
    scanBeam.classList.add('scanning');

    setTimeout(() => {
      const { valid, sum, steps } = luhnCheck(raw);

      // Update card
      card.classList.remove('valid', 'invalid');
      card.classList.add(valid ? 'valid' : 'invalid');

      // Result panel
      res
